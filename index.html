@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap');

.anchor-root {
  --bg: #090c14;
  --surface: #131826;
  --surface-2: #1c2336;
  --line: #2a3247;
  --text: #eef2f9;
  --muted: #818ca6;
  --accent: #3d80ff;
  --accent-bright: #5fa0ff;
  --accent-dim: #2356c9;
  --good: #4ed18a;
  --glow: rgba(61,128,255,0.55);
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 460px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  padding-bottom: 78px;
  overflow-x: hidden;
}
.anchor-root * { box-sizing: border-box; }
.loading { padding: 80px 24px; text-align: center; color: var(--muted); }

/* header */
.hd {
  position: sticky; top: 0; z-index: 20;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 18px 14px;
  padding-top: calc(16px + env(safe-area-inset-top, 0px));
  background: linear-gradient(180deg, var(--bg) 78%, rgba(9,12,20,0));
}
.hd-brand { display: flex; align-items: center; gap: 8px; }
.hd-mark {
  width: 22px; height: 22px; flex-shrink: 0;
  filter: drop-shadow(0 0 9px var(--glow));
}
.hd-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 22px; letter-spacing: 3px;
}
.icon-btn {
  background: var(--surface); border: 1px solid var(--line);
  color: var(--muted); width: 36px; height: 36px; border-radius: 10px;
  display: grid; place-items: center; cursor: pointer;
}
.icon-btn:active { transform: scale(0.94); }

/* layout */
.screen { padding: 0 16px; }
.view { display: flex; flex-direction: column; gap: 14px; padding-bottom: 24px; }
.kicker {
  font-family: 'Barlow Condensed', sans-serif;
  text-transform: uppercase; letter-spacing: 2.5px;
  font-size: 12px; color: var(--accent); font-weight: 600;
  margin-bottom: -6px;
}
.kicker-plain { color: var(--muted); font-size: 13px; }
.greeting {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 28px; line-height: 1.05;
}
.view-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 32px; margin: 0; line-height: 1.05;
}

/* cards */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.card-title {
  font-family: 'Barlow Condensed', sans-serif;
  text-transform: uppercase; letter-spacing: 1.5px;
  font-size: 13px; color: var(--muted); font-weight: 600;
}
.row-between { display: flex; align-items: center; justify-content: space-between; }
.muted-sm { color: var(--muted); font-size: 13.5px; line-height: 1.5; margin: 0; }
.center { text-align: center; }

/* why banner */
.why-banner {
  background: linear-gradient(135deg, rgba(61,128,255,0.16), rgba(61,128,255,0.04));
  border: 1px solid rgba(61,128,255,0.32);
  border-radius: 14px; padding: 13px 15px;
  display: flex; flex-direction: column; gap: 3px;
}
.why-label {
  font-family: 'Barlow Condensed', sans-serif;
  text-transform: uppercase; letter-spacing: 2px;
  font-size: 10.5px; color: var(--accent-bright); font-weight: 600;
}
.why-text { font-size: 15.5px; font-weight: 500; line-height: 1.35; }
.why-prompt {
  background: transparent; border: 1px dashed var(--line);
  color: var(--muted); border-radius: 13px; padding: 13px 15px;
  font-family: 'Barlow', sans-serif; font-size: 13px; cursor: pointer;
  text-align: left;
}

/* streak */
.streak-card {
  align-items: center; text-align: center; gap: 4px;
  background:
    radial-gradient(130% 95% at 50% 0%, rgba(61,128,255,0.22), transparent 72%),
    var(--surface);
  padding: 26px 16px 18px;
}
.streak-flame {
  color: var(--accent-bright);
  filter: drop-shadow(0 0 14px var(--glow));
  margin-bottom: 2px;
}
.streak-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 78px; line-height: 0.9;
  background: linear-gradient(180deg, var(--text), var(--accent-bright));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.streak-cap { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
.done-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(78,209,138,0.12); color: var(--good);
  border: 1px solid rgba(78,209,138,0.3);
  padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 600;
}

/* buttons */
.primary-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  background: linear-gradient(135deg, var(--accent-bright), var(--accent));
  color: #fff; border: none;
  padding: 12px 20px; border-radius: 11px;
  font-family: 'Barlow', sans-serif; font-weight: 600; font-size: 14.5px;
  cursor: pointer; align-self: flex-start;
  box-shadow: 0 8px 22px -8px var(--glow);
}
.primary-btn:active { transform: scale(0.97); }
.primary-btn.wide { align-self: stretch; padding: 14px; font-size: 15px; }
.back-btn {
  display: inline-flex; align-items: center; gap: 6px; align-self: flex-start;
  background: var(--surface); border: 1px solid var(--line); color: var(--muted);
  padding: 7px 13px; border-radius: 9px; font-size: 13px; cursor: pointer;
  font-family: 'Barlow', sans-serif;
}

/* quota bar */
.quota-count { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 24px; }
.quota-of { color: var(--muted); font-size: 16px; }
.bar { height: 8px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
.bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent-dim), var(--accent-bright));
  border-radius: 999px; transition: width 0.5s cubic-bezier(.4,0,.2,1);
}

/* plan */
.plan-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 22px; }
.plan-sub { color: var(--muted); font-size: 13.5px; margin-top: -4px; }
.plan-time {
  display: inline-flex; align-items: center; gap: 4px;
  color: var(--accent-bright); font-size: 12.5px; font-weight: 600;
}

/* mini grid */
.mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mini-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 14px; padding: 14px;
}
.mini-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 26px; line-height: 1; }
.mini-lab { color: var(--muted); font-size: 11.5px; text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; }

/* segmented toggle */
.seg { display: flex; gap: 2px; background: var(--surface-2); border-radius: 8px; padding: 2px; }
.seg-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-family: 'Barlow', sans-serif; font-weight: 600;
  font-size: 11.5px; padding: 5px 11px; border-radius: 6px;
}
.seg-btn.on {
  background: linear-gradient(135deg, var(--accent-bright), var(--accent));
  color: #fff;
}

/* week strip */
.week-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 4px 0; }
.week-cell { display: flex; flex-direction: column; align-items: center; gap: 7px; }
.week-letter {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
  font-size: 12px; color: var(--muted);
}
.week-dot {
  width: 26px; height: 26px; border-radius: 50%;
  background: transparent; border: 2px solid var(--line);
}
.week-dot.dot-today { box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent-bright); }
.week-dot.dot-future { opacity: 0.4; }

/* month grid */
.month-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 4px; padding: 4px 0;
}
.month-head {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
  font-size: 10.5px; color: var(--muted); text-align: center; padding-bottom: 2px;
}
.month-cell {
  aspect-ratio: 1; border-radius: 7px;
  background: var(--surface-2); border: 1px solid var(--line);
  display: grid; place-items: center;
  font-size: 11px; font-weight: 600; color: var(--muted);
}
.month-cell.blank { background: none; border: none; }
.month-cell.cell-today { box-shadow: 0 0 0 2px var(--accent-bright); }
.month-cell.cell-future { opacity: 0.4; }

/* habits */
.habit-count {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 17px; color: var(--accent-bright);
}
.habit-row {
  display: flex; align-items: center; gap: 11px;
  background: var(--surface-2); border: 1px solid var(--line);
  border-radius: 11px; padding: 11px 12px; cursor: pointer;
  text-align: left; color: var(--text); font-family: 'Barlow', sans-serif;
}
.habit-row.habit-done { border-color: rgba(78,209,138,0.35); }
.habit-box {
  width: 24px; height: 24px; border-radius: 7px; flex-shrink: 0;
  background: var(--bg); border: 1px solid var(--line); color: transparent;
  display: grid; place-items: center;
}
.habit-box.on { background: var(--good); border-color: var(--good); color: #fff; }
.habit-name { font-size: 14.5px; font-weight: 500; }
.habit-done .habit-name { color: var(--muted); }
.habit-edit-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface-2); border-radius: 9px;
  padding: 9px 11px; margin-bottom: 6px; font-size: 14px;
}
.habit-remove {
  background: none; border: none; color: var(--muted);
  cursor: pointer; display: grid; place-items: center;
  width: 24px; height: 24px;
}
.habit-add { display: flex; gap: 6px; margin-top: 2px; }
.habit-add-btn {
  flex-shrink: 0; width: 40px; border: none; cursor: pointer;
  background: linear-gradient(135deg, var(--accent-bright), var(--accent));
  color: #fff; border-radius: 10px; display: grid; place-items: center;
}

/* milestone */
.milestone-card {
  display: flex; align-items: center; gap: 12px;
  background: linear-gradient(135deg, rgba(61,128,255,0.16), rgba(61,128,255,0.04));
  border: 1px solid rgba(61,128,255,0.32);
  border-radius: 14px; padding: 13px 15px;
}
.milestone-ic {
  width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
  background: rgba(61,128,255,0.18); color: var(--accent-bright);
  display: grid; place-items: center;
}
.milestone-lab {
  font-family: 'Barlow Condensed', sans-serif;
  text-transform: uppercase; letter-spacing: 2px;
  font-size: 10.5px; color: var(--accent-bright); font-weight: 600;
}
.milestone-text { font-size: 15px; font-weight: 500; line-height: 1.3; }

/* session list */
.session-list { display: flex; flex-direction: column; gap: 10px; }
.session-row {
  display: flex; align-items: center; gap: 13px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 14px; padding: 13px 14px; cursor: pointer;
  text-align: left; color: var(--text); font-family: 'Barlow', sans-serif;
}
.session-row:active { transform: scale(0.99); }
.session-badge {
  width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0;
  display: grid; place-items: center;
  background: linear-gradient(135deg, var(--accent-bright), var(--accent));
  color: #fff;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 20px;
}
.session-badge.alt { background: var(--surface-2); color: var(--muted); }
.session-info { display: flex; flex-direction: column; gap: 2px; flex: 1; }
.session-name {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 18px;
  display: flex; align-items: center; gap: 8px;
}
.today-tag {
  font-family: 'Barlow', sans-serif; font-size: 9.5px; font-weight: 600;
  background: rgba(61,128,255,0.15); color: var(--accent-bright);
  padding: 2px 7px; border-radius: 6px; letter-spacing: 0.5px;
  text-transform: uppercase;
}
.session-meta { color: var(--muted); font-size: 12.5px; }
.session-chev { color: var(--muted); flex-shrink: 0; }
.tip-card strong { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; letter-spacing: 0.5px; }

/* logger */
.logger-progress { display: flex; align-items: center; gap: 10px; }
.logger-progress .bar { flex: 1; }
.ex-card { gap: 8px; }
.ex-head { display: flex; align-items: baseline; justify-content: space-between; }
.ex-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 17px; }
.ex-target { color: var(--muted); font-size: 12.5px; font-weight: 600; }
.ex-last { color: var(--accent-bright); font-size: 12px; margin-top: -3px; }
.set-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface-2); border-radius: 10px; padding: 7px 9px;
}
.set-row.set-done { background: rgba(78,209,138,0.08); }
.set-no {
  width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
  background: var(--bg); color: var(--muted);
  display: grid; place-items: center; font-size: 12px; font-weight: 600;
}
.set-bw { flex: 1; color: var(--muted); font-size: 13px; }
.ministep {
  display: flex; align-items: center; gap: 2px; flex: 1;
  background: var(--bg); border-radius: 8px; padding: 2px;
}
.ministep button {
  background: var(--surface); border: none; color: var(--text);
  width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
  display: grid; place-items: center;
}
.ministep button:active { transform: scale(0.9); }
.ministep-val { flex: 1; text-align: center; font-weight: 600; font-size: 14px; }
.ministep-val em { color: var(--muted); font-style: normal; font-size: 10.5px; margin-left: 2px; }
.set-check {
  width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; cursor: pointer;
  background: var(--bg); border: 1px solid var(--line); color: var(--line);
  display: grid; place-items: center;
}
.set-check.on { background: var(--good); border-color: var(--good); color: #fff; }

/* block bar */
.blockbar { gap: 9px; }

/* deload */
.deload-card {
  background: linear-gradient(135deg, rgba(108,198,224,0.12), var(--surface));
  border-color: rgba(108,198,224,0.3);
}
.deload-head {
  display: flex; align-items: center; gap: 7px;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 17px;
  color: #6cc6e0; letter-spacing: 0.5px;
}
.deload-tag {
  font-family: 'Barlow', sans-serif; font-size: 9.5px; font-weight: 600;
  background: rgba(108,198,224,0.18); color: #6cc6e0;
  padding: 2px 7px; border-radius: 6px; letter-spacing: 0.5px;
  text-transform: uppercase; margin-left: 8px;
}

/* freeze */
.freeze-card {
  display: flex; align-items: center; gap: 12px;
  background: linear-gradient(135deg, rgba(108,198,224,0.14), rgba(108,198,224,0.04));
  border: 1px solid rgba(108,198,224,0.32);
  border-radius: 14px; padding: 13px 14px;
}
.freeze-text { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.freeze-title { font-weight: 600; font-size: 14px; }
.freeze-sub { color: var(--muted); font-size: 12px; line-height: 1.4; }
.freeze-btn {
  flex-shrink: 0; cursor: pointer;
  background: #6cc6e0; border: none; color: #0b0f17;
  border-radius: 10px; padding: 9px 14px;
  font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 13px;
}
.freeze-btn:active { transform: scale(0.96); }

/* weekly check-in */
.checkin-prompt {
  display: flex; align-items: center; gap: 11px;
  width: 100%; cursor: pointer; text-align: left;
  background: linear-gradient(135deg, rgba(61,128,255,0.16), rgba(61,128,255,0.04));
  border: 1px solid rgba(61,128,255,0.32);
  border-radius: 14px; padding: 13px 14px;
  color: var(--text); font-family: 'Barlow', sans-serif;
}
.checkin-prompt-ic {
  width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
  background: rgba(61,128,255,0.18); color: var(--accent-bright);
  display: grid; place-items: center;
}
.checkin-prompt-text { flex: 1; display: flex; flex-direction: column; gap: 1px; }
.checkin-prompt-text strong {
  font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700;
}
.checkin-prompt-text span { color: var(--muted); font-size: 12.5px; }
.checkin-card { gap: 11px; }
.checkin-lead { font-size: 13.5px; margin: 0; }
.checkin-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.checkin-stat {
  background: var(--surface-2); border-radius: 11px;
  padding: 12px 8px; text-align: center;
}
.checkin-val {
  display: block;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 24px; color: var(--accent-bright);
}
.checkin-val em { font-size: 13px; font-style: normal; color: var(--muted); }
.checkin-lab {
  display: block; color: var(--muted); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.8px; margin-top: 3px;
}
.checkin-note {
  background: var(--surface-2); border-radius: 10px; padding: 11px 12px;
  font-size: 13px; line-height: 1.5; margin: 0;
}
.checkin-focus { display: flex; flex-direction: column; }
.focus-options { display: flex; flex-wrap: wrap; gap: 6px; }
.focus-opt {
  background: var(--surface-2); border: 1px solid var(--line); color: var(--muted);
  border-radius: 9px; padding: 8px 11px; font-size: 12.5px; cursor: pointer;
  font-family: 'Barlow', sans-serif; font-weight: 600;
}
.focus-opt.on {
  background: linear-gradient(135deg, var(--accent-bright), var(--accent));
  border-color: var(--accent); color: #fff;
}
.primary-btn:disabled { opacity: 0.4; cursor: default; }

/* focus banner */
.focus-banner {
  display: flex; align-items: center; gap: 11px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-left: 3px solid var(--accent);
  border-radius: 12px; padding: 11px 13px;
}
.focus-banner-ic {
  width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
  background: rgba(61,128,255,0.15); color: var(--accent-bright);
  display: grid; place-items: center;
}
.focus-banner-lab {
  display: block;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
  font-size: 10.5px; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--accent-bright);
}
.focus-banner-text { font-size: 14.5px; font-weight: 500; }

/* spotify card */
.spotify-card {
  display: flex; align-items: center; gap: 11px;
  background: linear-gradient(135deg, rgba(78,209,138,0.13), var(--surface));
  border: 1px solid rgba(78,209,138,0.3);
  border-radius: 14px; padding: 12px 14px;
  text-decoration: none; color: var(--text);
}
.spotify-card:active { transform: scale(0.99); }
.spotify-ic {
  width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
  background: rgba(78,209,138,0.18); color: var(--good);
  display: grid; place-items: center;
}
.spotify-text { flex: 1; display: flex; flex-direction: column; gap: 1px; }
.spotify-lab {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
  font-size: 10.5px; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--good);
}
.spotify-vibe { font-size: 14px; font-weight: 500; }
.spotify-go {
  display: inline-flex; align-items: center; gap: 1px; flex-shrink: 0;
  color: var(--good); font-size: 12.5px; font-weight: 600;
}

/* wind-down card */
.winddown-card {
  background: linear-gradient(135deg, rgba(169,138,214,0.12), var(--surface));
  border-color: rgba(169,138,214,0.3);
}
.winddown-head {
  display: flex; align-items: center; gap: 7px;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
  font-size: 13px; text-transform: uppercase; letter-spacing: 1.2px;
  color: #b89ee0;
}
.winddown-focus {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 22px;
}
.winddown-sub { color: var(--muted); font-size: 13px; line-height: 1.45; margin-top: -4px; }
.nightly-tag {
  font-family: 'Barlow', sans-serif; font-size: 9.5px; font-weight: 600;
  background: rgba(169,138,214,0.18); color: #b89ee0;
  padding: 2px 7px; border-radius: 6px; letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* warm-up */
.warmup-card { gap: 7px; }
.warmup-head {
  display: flex; align-items: center; justify-content: space-between;
  background: none; border: none; cursor: pointer; padding: 0; width: 100%;
}
.warmup-row {
  display: flex; align-items: center; gap: 9px;
  background: var(--surface-2); border: none; border-radius: 9px;
  padding: 8px 10px; cursor: pointer; text-align: left;
  color: var(--text); font-family: 'Barlow', sans-serif;
}
.warmup-row.on .warmup-name { color: var(--muted); }
.check-box.small { width: 20px; height: 20px; border-radius: 6px; }
.warmup-name { font-size: 13.5px; font-weight: 500; flex: 1; }
.warmup-detail { color: var(--muted); font-size: 12px; }

/* exercise card */
.ex-actions { display: flex; gap: 6px; }
.ex-icon {
  width: 30px; height: 30px; border-radius: 8px; cursor: pointer;
  background: var(--surface-2); border: 1px solid var(--line);
  color: var(--muted); display: grid; place-items: center;
}
.ex-icon.on { background: rgba(61,128,255,0.15); border-color: var(--accent); color: var(--accent-bright); }
.ex-how {
  background: var(--surface-2); border-radius: 9px; padding: 10px 12px;
  font-size: 13px; line-height: 1.5; color: var(--muted);
}
.ex-swap {
  background: var(--surface-2); border-radius: 9px; padding: 10px 12px;
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
}
.ex-swap-label {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
  font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--muted); margin-right: 2px;
}
.ex-swap-opt {
  background: var(--bg); border: 1px solid var(--line); color: var(--text);
  border-radius: 8px; padding: 6px 11px; font-size: 12.5px; cursor: pointer;
  font-family: 'Barlow', sans-serif; font-weight: 500;
}
.ex-swap-opt:active { transform: scale(0.96); }

/* prescription */
.presc {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface-2); border-radius: 10px; padding: 9px 12px;
}
.presc-main { display: flex; align-items: baseline; gap: 8px; }
.presc-weight {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 24px; color: var(--accent-bright);
}
.presc-weight em { font-size: 12px; font-style: normal; color: var(--muted); margin-left: 2px; }
.presc-reps { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 17px; }
.presc-sets { color: var(--muted); font-size: 12.5px; }
.adjust-btn {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--bg); border: 1px solid var(--line); color: var(--muted);
  border-radius: 8px; padding: 6px 10px; font-size: 11.5px; cursor: pointer;
  font-family: 'Barlow', sans-serif; font-weight: 600;
}
.adjust-btn.on { border-color: var(--accent); color: var(--accent-bright); }
.adjust-row {
  display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
  background: var(--surface-2); border-radius: 10px; padding: 10px 12px;
}
.adjust-item { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 130px; }
.adjust-lab {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
  font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--muted); width: 52px;
}
.adjust-hint { width: 100%; color: var(--muted); font-size: 11.5px; }

/* set circles */
.set-circles { display: flex; flex-wrap: wrap; gap: 8px; }
.set-circle {
  width: 44px; height: 44px; border-radius: 12px; cursor: pointer;
  background: var(--bg); border: 1.5px solid var(--line); color: var(--muted);
  display: grid; place-items: center;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 17px;
}
.set-circle.on {
  background: var(--good); border-color: var(--good); color: #fff;
}
.set-circle:active { transform: scale(0.93); }

/* checklist */
.check-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 13px; padding: 12px 13px; cursor: pointer;
  text-align: left; color: var(--text); font-family: 'Barlow', sans-serif;
}
.check-row.check-on { border-color: rgba(78,209,138,0.35); }
.check-box {
  width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0;
  background: var(--bg); border: 1px solid var(--line); color: transparent;
  display: grid; place-items: center;
}
.check-box.on { background: var(--good); border-color: var(--good); color: #fff; }
.check-info { display: flex; flex-direction: column; }
.check-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 16px; }
.check-detail { color: var(--muted); font-size: 12.5px; }

/* conditioning */
.cond-card { flex-direction: row; align-items: center; gap: 12px; font-size: 14px; }
.cond-num {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  background: var(--surface-2); color: var(--accent-bright);
  display: grid; place-items: center;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
}

/* chart */
.chart { width: 100%; height: 110px; display: block; }
.chart-empty {
  color: var(--muted); font-size: 13px; text-align: center;
  padding: 28px 8px; background: var(--surface-2); border-radius: 12px;
}
.weight-entry { display: flex; gap: 8px; }
.weight-input {
  flex: 1; background: var(--surface-2); border: 1px solid var(--line);
  color: var(--text); border-radius: 11px; padding: 11px 14px;
  font-family: 'Barlow', sans-serif; font-size: 15px;
}
.weight-input:focus { outline: none; border-color: var(--accent); }

/* summary card */
.summary-row {
  display: flex; align-items: baseline; gap: 8px;
  padding: 9px 0; border-bottom: 1px solid var(--line);
}
.summary-row:last-of-type { border-bottom: none; }
.summary-label { flex: 1; font-size: 13.5px; }
.summary-val {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 22px;
}
.summary-delta {
  font-size: 11.5px; font-weight: 600;
  padding: 2px 7px; border-radius: 6px;
}
.summary-delta.up { background: rgba(78,209,138,0.14); color: var(--good); }
.summary-delta.down { background: rgba(232,116,110,0.14); color: #e8746e; }
.summary-delta.flat { background: var(--surface-2); color: var(--muted); }

/* consistency bars */
.bars {
  display: flex; align-items: flex-end; gap: 5px;
  height: 120px; padding: 4px 0;
}
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; height: 100%; }
.bar-track { flex: 1; width: 100%; display: flex; align-items: flex-end; }
.bar-grow {
  width: 100%; border-radius: 6px 6px 3px 3px;
  background: linear-gradient(180deg, var(--accent-bright), var(--accent-dim));
  display: flex; align-items: flex-start; justify-content: center;
  min-height: 3px; transition: height 0.5s cubic-bezier(.4,0,.2,1);
}
.bar-count {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 11px; color: #fff; padding-top: 3px;
}
.bar-label {
  font-size: 10px; color: var(--muted);
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
}

/* per-exercise progress */
.ex-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.ex-pill {
  background: var(--surface-2); border: 1px solid var(--line); color: var(--muted);
  border-radius: 8px; padding: 6px 10px; font-size: 11.5px; cursor: pointer;
  font-family: 'Barlow', sans-serif; font-weight: 600;
}
.ex-pill.on {
  background: linear-gradient(135deg, var(--accent-bright), var(--accent));
  border-color: var(--accent); color: #fff;
}
.ex-stat-row {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 13.5px;
}
.ex-stat-row strong { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; }
.ex-gain { font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 6px; }
.ex-gain.up { background: rgba(78,209,138,0.14); color: var(--good); }
.ex-gain.down { background: rgba(232,116,110,0.14); color: #e8746e; }
.ex-gain.flat { background: var(--surface-2); color: var(--muted); }

/* fuel */
.meal-stage {
  font-family: 'Barlow Condensed', sans-serif;
  text-transform: uppercase; letter-spacing: 1.5px;
  font-size: 13px; color: var(--accent-bright); font-weight: 600;
}
.guide-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
  text-align: center; padding: 4px 0;
}
.guide-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 19px; color: var(--accent-bright); }
.guide-lab { color: var(--muted); font-size: 10.5px; text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }
.bf-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 21px; }
.bf-tip {
  background: var(--surface-2); border-radius: 10px; padding: 11px 12px;
  font-size: 13px; line-height: 1.5; color: var(--muted);
}
.bf-tip strong { color: var(--accent-bright); }

/* lunch accordion */
.spot {
  border: 1px solid var(--line); border-radius: 12px;
  overflow: hidden; background: var(--surface-2);
}
.spot-open { border-color: rgba(61,128,255,0.32); }
.spot-head {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  background: none; border: none; cursor: pointer; padding: 12px 13px;
  color: var(--text); font-family: 'Barlow', sans-serif;
}
.spot-info { display: flex; flex-direction: column; gap: 1px; text-align: left; }
.spot-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 17px; }
.spot-walk { color: var(--muted); font-size: 11.5px; }
.spot-chev { color: var(--muted); transition: transform 0.2s; }
.spot-chev.up { transform: rotate(180deg); }
.spot-body { padding: 0 13px 13px; display: flex; flex-direction: column; gap: 9px; }

/* lunch order cards */
.order-card {
  background: var(--bg); border: 1px solid var(--line);
  border-radius: 10px; padding: 10px 12px;
}
.order-top {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 8px; flex-wrap: wrap;
}
.order-title {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 15px;
}
.order-note {
  font-size: 10.5px; font-weight: 600; color: var(--good);
  background: rgba(78,209,138,0.13); padding: 2px 7px; border-radius: 5px;
}
.order-desc { font-size: 12.5px; line-height: 1.5; color: var(--muted); margin: 5px 0 0; }

/* pick for me */
.pickme-row { display: flex; gap: 8px; }
.pickme-btn {
  flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  background: var(--surface); border: 1px solid var(--accent);
  color: var(--accent-bright); border-radius: 11px; padding: 11px;
  font-family: 'Barlow', sans-serif; font-weight: 600; font-size: 13px; cursor: pointer;
}
.pickme-btn:active { transform: scale(0.97); }
.pick-result {
  display: flex; align-items: center; gap: 9px;
  background: linear-gradient(135deg, rgba(61,128,255,0.16), rgba(61,128,255,0.04));
  border: 1px solid rgba(61,128,255,0.32);
  border-radius: 12px; padding: 11px 13px;
}
.pick-kind {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 10.5px; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--accent-bright); flex-shrink: 0;
}
.pick-text { flex: 1; font-size: 14px; font-weight: 500; }
.pick-again {
  display: inline-flex; align-items: center; gap: 4px; flex-shrink: 0;
  background: var(--surface-2); border: 1px solid var(--line); color: var(--muted);
  border-radius: 8px; padding: 5px 9px; font-size: 11px; cursor: pointer;
  font-family: 'Barlow', sans-serif; font-weight: 600;
}

/* dinner idea pool */
.idea-grid { display: flex; flex-direction: column; gap: 8px; }
.idea-chip {
  background: var(--surface-2); border: 1px solid var(--line);
  border-radius: 11px; padding: 11px 12px;
}
.idea-head { display: flex; align-items: center; gap: 6px; }
.idea-name {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
  font-size: 16px; flex: 1;
}
.idea-kid { color: var(--accent-bright); flex-shrink: 0; }
.idea-tag {
  display: inline-block; margin-top: 3px;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--accent-bright);
  background: rgba(61,128,255,0.12); padding: 2px 7px; border-radius: 5px;
}
.idea-blurb { font-size: 12.5px; line-height: 1.5; color: var(--muted); margin: 6px 0 0; }

/* weekly recipes */
.recipe-card { gap: 8px; }
.recipe-row {
  border: 1px solid var(--line); border-radius: 11px;
  background: var(--surface-2); overflow: hidden;
}
.recipe-open { border-color: rgba(61,128,255,0.32); }
.recipe-head {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  background: none; border: none; cursor: pointer; padding: 11px 12px;
  color: var(--text); font-family: 'Barlow', sans-serif;
}
.recipe-info { display: flex; flex-direction: column; gap: 1px; text-align: left; }
.recipe-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 16px; }
.recipe-meta { color: var(--muted); font-size: 11.5px; }
.recipe-steps {
  margin: 0; padding: 0 14px 12px 30px;
  display: flex; flex-direction: column; gap: 6px;
  font-size: 13px; line-height: 1.5; color: var(--muted);
}
.recipe-steps li { padding-left: 2px; }

/* grocery */
.groc-head {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  background: none; border: none; cursor: pointer; padding: 0;
}
.groc-list { display: flex; flex-wrap: wrap; gap: 6px; }
.groc-item {
  background: var(--surface-2); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; font-size: 12.5px;
}

/* eating out */
.eatout-card { background: linear-gradient(135deg, rgba(240,169,59,0.07), var(--surface)); }
.eatout-row {
  display: flex; gap: 9px; font-size: 13.5px; line-height: 1.5;
  align-items: flex-start;
}
.eatout-dot {
  width: 6px; height: 6px; border-radius: 50%; background: #f0a93b;
  margin-top: 7px; flex-shrink: 0;
}

/* prep */
.prep-card { background: linear-gradient(135deg, rgba(61,128,255,0.08), var(--surface)); }
.prep-step { display: flex; gap: 10px; font-size: 13.5px; line-height: 1.5; align-items: flex-start; }
.prep-num {
  width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
  background: var(--accent); color: #fff;
  display: grid; place-items: center; font-size: 12px; font-weight: 700;
  font-family: 'Barlow Condensed', sans-serif;
}

/* tabbar */
.tabbar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 460px;
  display: grid; grid-template-columns: repeat(4, 1fr);
  background: rgba(15,19,30,0.96);
  border-top: 1px solid var(--line);
  backdrop-filter: blur(12px);
  z-index: 20;
}
.tab {
  background: none; border: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 11px 0 13px; color: var(--muted);
  font-family: 'Barlow', sans-serif; font-size: 10.5px; font-weight: 600;
}
.tab-on { color: var(--accent-bright); }
.tab-on svg { filter: drop-shadow(0 0 8px var(--glow)); }

/* sheet */
.sheet-overlay {
  position: fixed; inset: 0; z-index: 40;
  background: rgba(0,0,0,0.62);
  display: flex; align-items: flex-end; justify-content: center;
}
.sheet {
  width: 100%; max-width: 460px;
  background: var(--surface);
  border-top: 1px solid var(--line);
  border-radius: 20px 20px 0 0;
  padding: 18px 18px 28px;
  max-height: 88vh; overflow-y: auto;
  animation: slideUp 0.26s cubic-bezier(.2,.7,.3,1);
}
.sheet-head {
  display: flex; align-items: center; justify-content: space-between;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 19px;
  letter-spacing: 0.5px; margin-bottom: 12px;
}
.sheet-sub { color: var(--muted); font-size: 13px; margin: 0 0 14px; }
.quick-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 9px; }
.quick-tile {
  background: var(--surface-2); border: 1px solid var(--line);
  border-radius: 13px; padding: 14px 6px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 7px;
